name: Test Poetry setup with specific version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          poetry-version: "1.7.1"
      - name: Assert poetry version matches requested version
        run: |
          EXPECTED="1.7.1"
          ACTUAL=$(poetry --version 2>&1 | grep -oP '[\d]+\.[\d]+\.[\d]+')
          echo "actual: $ACTUAL"
          echo "expected: $EXPECTED"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "FAIL: expected poetry version '$EXPECTED' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS: poetry version is $ACTUAL"
