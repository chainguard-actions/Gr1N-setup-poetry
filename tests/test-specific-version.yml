name: Test specific Poetry version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          poetry-version: "1.8.3"
      - name: Assert correct poetry version is installed
        run: |
          echo "Checking poetry version..."
          INSTALLED_VERSION=$(poetry --version 2>&1 | grep -oP '[\d]+\.[\d]+\.[\d]+')
          echo "actual: $INSTALLED_VERSION"
          if [ "$INSTALLED_VERSION" != "1.8.3" ]; then
            echo "FAIL: expected poetry version '1.8.3' but got '$INSTALLED_VERSION'"
            exit 1
          fi
          echo "PASS: correct poetry version installed"
